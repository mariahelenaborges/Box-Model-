<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Card de perfil</title>

<style>
body{
background-color: #e27070;
font-family:(Arial);
}

.card{
max-width:300px;
min-height:350px;
margin:50px auto;
padding:25px;
background-color:white; 
border:2px solid #ccc;
border-radius:10px;
box-sizing:border-box;
text-align:center;
}

.card img{
width:120px;
height:120px;
border-radius:50%;
margin-bottom:15px;
border:3px solid rgb(53, 1, 1);
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.card h2{
margin-top:10px;
margin-bottom:10px;
}

.card p{
margin-bottom:20px;
}

.botao{
padding:10px 20px;
margin-top:10px;
background-color:#e27070;
color:white;
border:none;
border-radius:5px;
}

.botao:hover{
background-color:crimson;
}

</style>
</head>

<body>

<div class="card">

<img src="foto.jpg" alt="foto de perfil">

<h2>Lena</h2>

<p>I feel like I've lived most my life in my imagination.</p>

<button class="botao">Seguir</button>

</div>

</body>
</html>
